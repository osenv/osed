name: connector-image
# Test the regulatory connector and publish its container image to GHCR, so
# hosting it as a remote MCP (Cowork/claude.ai) is a one-line `deploy --image`.
# See connectors/regulatory/DEPLOY.md.
on:
  push:
    branches: ["main"]
    paths: ["connectors/regulatory/**", ".github/workflows/connector-image.yml"]
    tags: ["connector-v*"]
  pull_request:
    paths: ["connectors/regulatory/**", ".github/workflows/connector-image.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install connector (with dev extras)
        run: pip install "./connectors/regulatory[dev]"
      - name: Run connector test suite (live tests deselected)
        run: pytest -q -m "not live" connectors/regulatory

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # enable linux/arm64 emulation
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/osed-connector
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
            type=ref,event=pr
      - name: Build (and push on main/tag)
        uses: docker/build-push-action@v6
        with:
          context: connectors/regulatory
          platforms: linux/amd64,linux/arm64
          # Build on PRs for validation; only publish on push to main / tags.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
