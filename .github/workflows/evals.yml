name: evals
on:
  push:
    paths: ["skills/**", "templates/**", "evals/**", "docs/doctrinal-currency.md", ".github/workflows/evals.yml"]
  pull_request:
    paths: ["skills/**", "templates/**", "evals/**", "docs/doctrinal-currency.md"]
jobs:
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: cd evals && pip install -e '.[dev]'
      - name: Run deterministic eval suite (no secrets, judge + live deselected)
        run: cd evals && pytest -q
